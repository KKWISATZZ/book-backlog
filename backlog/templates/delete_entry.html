{% extends "base.html" %}

{% block title %}Delete Book - Book Backlog{% endblock %}

{% block content %}
    <h1>Remove "{{ object.book.title }}" from your backlog?</h1>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
    </form>
    <a href="{% url 'backlog_list' %}">Cancel</a>
{% endblock %}
