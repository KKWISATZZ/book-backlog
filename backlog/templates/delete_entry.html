{% extends "base.html" %}

{% block title %}Delete Book - Book Backlog{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 500px;">
    <h1 class="mb-4">Remove "{{ object.book.title }}" from your backlog?</h1>

    <form method="post" class="d-flex gap-2">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'backlog_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
